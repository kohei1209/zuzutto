name: rnaseq_env
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # ==============================
  # バイオインフォマティクスツール
  # ==============================
  - fastqc=0.12.1
  - multiqc=1.21
  - trim-galore=0.6.10
  - star=2.7.11b
  - subread=2.0.6
  - samtools=1.19

  # ==============================
  # R + DEG解析
  # ==============================
  - r-base=4.3
  - r-irkernel
  - bioconductor-deseq2
  - bioconductor-edger
  - r-pheatmap
  - r-ggplot2
  - r-dplyr
  - r-readr
  - r-tidyr
  - r-rcolorbrewer

  # ==============================
  # Python
  # ==============================
  - python=3.11
  - pip
  - pandas>=2.0
  - numpy>=1.24
  - plotly>=5.18
  - scipy>=1.11
  - scikit-learn>=1.3
  - ipykernel
  - jupyter
  - nbformat

  # pip追加パッケージ
  - pip:
    - kaleido>=0.2.1
